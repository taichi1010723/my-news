<!DOCTYPE html>
<html lang="ja" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Personal Newsroom PRO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        .news-card { transition: all 0.2s ease; border-left: 4px solid #0d6efd; }
        .news-card.read { opacity: 0.4; border-left-color: #6c757d; }
        .badge-s { background-color: #dc3545; color: white; animation: pulse 2s infinite; }
        .badge-a { background-color: #fd7e14; color: white; }
        .badge-b { background-color: #ffc107; color: black; }
        .badge-c { background-color: #6c757d; color: white; }
        .nav-link { cursor: pointer; font-size: 0.9rem; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg bg-body-tertiary border-bottom sticky-top">
        <div class="container">
            <span class="navbar-brand mb-0 h1"><i class="bi bi-rocket-takeoff-fill me-2 text-danger"></i>Newsroom PRO</span>
            <button class="btn btn-outline-secondary btn-sm" id="themeToggle"><i class="bi bi-sun-fill" id="themeIcon"></i></button>
        </div>
    </nav>

    <div class="container my-4">
        <div class="mb-3">
            <small class="text-muted d-block mb-2">重要度で絞り込み:</small>
            <div class="btn-group btn-group-sm" role="group" id="importanceFilter">
                <button type="button" class="btn btn-outline-primary active" data-imp="all">すべて</button>
                <button type="button" class="btn btn-outline-danger" data-imp="S">🔥 S級最重要</button>
                <button type="button" class="btn btn-outline-warning" data-imp="A">A級</button>
                <button type="button" class="btn btn-outline-info" data-imp="B">B級</button>
                <button type="button" class="btn btn-outline-secondary" data-imp="C">C級</button>
            </div>
        </div>

        <div class="overflow-x-auto text-nowrap pb-2 mb-4 border-bottom">
            <ul class="nav nav-pills" id="categoryTabs">
                <li class="nav-item"><a class="nav-link active" data-category="all">全ジャンル</a></li>
                <li class="nav-item"><a class="nav-link" data-category="AI・テック">AI・テック</a></li>
                <li class="nav-item"><a class="nav-link" data-category="マーケティング">マーケティング</a></li>
                <li class="nav-item"><a class="nav-link" data-category="ビジネス">ビジネス</a></li>
                <li class="nav-item"><a class="nav-link" data-category="株・経済">株・経済</a></li>
                <li class="nav-item"><a class="nav-link" data-category="日本企業">日本企業</a></li>
                <li class="nav-item"><a class="nav-link" data-category="世界企業情勢">世界企業</a></li>
                <li class="nav-item"><a class="nav-link" data-category="世界情勢">世界情勢</a></li>
                <li class="nav-item"><a class="nav-link" data-category="スポーツ">スポーツ</a></li>
                <li class="nav-item"><a class="nav-link text-warning" data-category="favorite"><i class="bi bi-star-fill me-1"></i>お気に入り</a></li>
            </ul>
        </div>

        <div id="newsContainer" class="row g-3"></div>
    </div>

    <script>
        let newsData = [];
        let reads = JSON.parse(localStorage.getItem('news_reads') || '[]');
        let favorites = JSON.parse(localStorage.getItem('news_favorites') || '[]');
        let currentCategory = 'all';
        let currentImportance = 'all';

        // テーマ切替
        const htmlTag = document.documentElement;
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = document.getElementById('themeIcon');
        themeToggle.addEventListener('click', () => {
            if (htmlTag.getAttribute('data-bs-theme') === 'dark') {
                htmlTag.setAttribute('data-bs-theme', 'light'); themeIcon.className = 'bi bi-moon-fill';
            } else {
                htmlTag.setAttribute('data-bs-theme', 'dark'); themeIcon.className = 'bi bi-sun-fill';
            }
        });

        // データ読み込み
        fetch('./news_data.json').then(res => res.json()).then(data => { newsData = data; renderNews(); });

        function renderNews() {
            const container = document.getElementById('newsContainer');
            container.innerHTML = '';

            const filtered = newsData.filter(item => {
                const matchCat = currentCategory === 'all' ? true : (currentCategory === 'favorite' ? favorites.includes(item.id) : item.category === currentCategory);
                const matchImp = currentImportance === 'all' ? true : item.importance === currentImportance;
                return matchCat && matchImp;
            });

            if (filtered.length === 0) {
                container.innerHTML = `<div class="col-12 text-center text-muted py-5">該当するニュースはありません。</div>`; return;
            }

            filtered.forEach(item => {
                const isRead = reads.includes(item.id);
                const isFav = favorites.includes(item.id);
                const impClass = `badge-${(item.importance || 'C').toLowerCase()}`;
                
                const card = document.createElement('div');
                card.className = 'col-12';
                card.innerHTML = `
                    <div class="card news-card ${isRead ? 'read' : ''} shadow-sm mb-2">
                        <div class="card-body py-3">
                            <div class="d-flex justify-content-between align-items-center mb-2">
                                <div>
                                    <span class="badge ${impClass} me-1">重要度 ${item.importance || 'C'}</span>
                                    <span class="badge bg-secondary">${item.category}</span>
                                </div>
                                <small class="text-muted small">${item.date || ''}</small>
                            </div>
                            <h5 class="card-title h6 fw-bold mb-2">
                                <a href="${item.url}" target="_blank" class="text-decoration-none text-body" onclick="markAsRead('${item.id}')">${item.title}</a>
                            </h5>
                            <ul class="text-secondary ps-3 small mb-2">
                                ${item.summary.map(s => `<li>${s}</li>`).join('')}
                            </ul>
                            <div class="d-flex justify-content-end gap-2 border-top pt-2">
                                <button class="btn btn-sm btn-link text-decoration-none p-0 text-secondary me-auto" onclick="toggleRead('${item.id}')"><i class="bi ${isRead ? 'bi-check-circle-fill text-success' : 'bi-circle'}"></i> ${isRead ? '既読' : '未読にする'}</button>
                                <button class="btn btn-sm p-0 text-warning" onclick="toggleFav('${item.id}')"><i class="bi ${isFav ? 'bi-star-fill' : 'bi-star'}"></i></button>
                            </div>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function markAsRead(id) { if (!reads.includes(id)) { reads.push(id); save(); renderNews(); } }
        function toggleRead(id) { const i = reads.indexOf(id); if (i > -1) reads.splice(i, 1); else reads.push(id); save(); renderNews(); }
        function toggleFav(id) { const i = favorites.indexOf(id); if (i > -1) favorites.splice(i, 1); else favorites.push(id); save(); renderNews(); }
        function save() { localStorage.setItem('news_reads', JSON.stringify(reads)); localStorage.setItem('news_favorites', JSON.stringify(favorites)); }

        document.getElementById('categoryTabs').addEventListener('click', (e) => {
            const a = e.target.closest('a'); if (!a) return;
            document.querySelectorAll('#categoryTabs .nav-link').forEach(el => el.classList.remove('active'));
            a.classList.add('active'); currentCategory = a.getAttribute('data-category'); renderNews();
        });

        document.getElementById('importanceFilter').addEventListener('click', (e) => {
            const b = e.target.closest('button'); if (!b) return;
            document.querySelectorAll('#importanceFilter .btn').forEach(el => el.classList.remove('active'));
            b.classList.add('active'); currentImportance = b.getAttribute('data-imp'); renderNews();
        });
    </script>
</body>
</html>
