<!DOCTYPE html>
<html lang="ja" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Personal Newsroom</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body {
            background-color: var(--bs-body-bg);
            color: var(--bs-body-color);
        }
        .news-card { 
            transition: all 0.2s ease; 
            border-left: 4px solid #0d6efd; 
        }
        .news-card.read { 
            opacity: 0.5; 
            border-left-color: #6c757d; 
        }
        .bi-star-fill { 
            color: #ffc107; 
        }
        .nav-link { 
            cursor: pointer; 
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg bg-body-tertiary border-bottom sticky-top">
        <div class="container">
            <span class="navbar-brand mb-0 h1"><i class="bi bi-newspaper me-2"></i>My Newsroom</span>
            <div class="d-flex align-items-center">
                <button class="btn btn-outline-secondary btn-sm" id="themeToggle">
                    <i class="bi bi-sun-fill" id="themeIcon"></i> テーマ切替
                </button>
            </div>
        </div>
    </nav>

    <div class="container my-4">
        <ul class="nav nav-pills mb-4" id="categoryTabs">
            <li class="nav-item"><a class="nav-link active" data-category="all">すべて</a></li>
            <li class="nav-item"><a class="nav-link" data-category="広告">広告</a></li>
            <li class="nav-item"><a class="nav-link" data-category="経済">経済</a></li>
            <li class="nav-item"><a class="nav-link" data-category="世界企業情勢">世界企業情勢</a></li>
            <li class="nav-item"><a class="nav-link" data-category="世界情勢">世界情勢</a></li>
            <li class="nav-item"><a class="nav-link text-warning" data-category="favorite"><i class="bi bi-star-fill me-1"></i>お気に入り</a></li>
        </ul>

        <div id="newsContainer" class="row g-3">
            <div class="text-center py-5">
                <div class="spinner-border text-primary" role="status"></div>
                <p class="mt-2 text-muted">ニュースデータを読み込み中...</p>
            </div>
        </div>
    </div>

    <script>
        let newsData = [];
        // ブラウザの記憶領域(LocalStorage)から既読・お気に入りを読み込み
        let reads = JSON.parse(localStorage.getItem('news_reads') || '[]');
        let favorites = JSON.parse(localStorage.getItem('news_favorites') || '[]');
        let currentCategory = 'all';

        // テーマ（ライト・ダーク）切り替えの管理
        const htmlTag = document.documentElement;
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = document.getElementById('themeIcon');
        
        if (localStorage.getItem('theme') === 'light') {
            htmlTag.setAttribute('data-bs-theme', 'light');
            themeIcon.className = 'bi bi-moon-fill';
        }

        themeToggle.addEventListener('click', () => {
            if (htmlTag.getAttribute('data-bs-theme') === 'dark') {
                htmlTag.setAttribute('data-bs-theme', 'light');
                themeIcon.className = 'bi bi-moon-fill';
                localStorage.setItem('theme', 'light');
            } else {
                htmlTag.setAttribute('data-bs-theme', 'dark');
                themeIcon.className = 'bi bi-sun-fill';
                localStorage.setItem('theme', 'dark');
            }
        });

        // 蓄積されたJSONデータを読み込む
        fetch('./news_data.json')
            .then(res => {
                if (!res.ok) throw new Error('データが見つかりません');
                return res.json();
            })
            .then(data => {
                newsData = data;
                renderNews();
            })
            .catch(err => {
                document.getElementById('newsContainer').innerHTML = `
                    <div class="col-12 text-center py-5">
                        <div class="alert alert-warning d-inline-block">
                            <i class="bi bi-exclamation-triangle-fill me-2"></i>
                            ニュースデータ（news_data.json）がまだ作られていないか、反映待ちです。<br>
                            GitHubの「Actions」から「Auto News Summary」を一度実行してください。
                        </div>
                    </div>`;
            });

        // ニュースを画面に表示する処理
        function renderNews() {
            const container = document.getElementById('newsContainer');
            container.innerHTML = '';

            // 選択されたカテゴリでニュースを絞り込む
            const filtered = newsData.filter(item => {
                if (currentCategory === 'all') return true;
                if (currentCategory === 'favorite') return favorites.includes(item.id);
                return item.category === currentCategory;
            });

            if (filtered.length === 0) {
                container.innerHTML = `<div class="col-12 text-center text-muted py-5">該当するニュースはありません。</div>`;
                return;
            }

            filtered.forEach(item => {
                const isRead = reads.includes(item.id);
                const isFav = favorites.includes(item.id);
                
                const card = document.createElement('div');
                card.className = 'col-12'; // 横幅いっぱいに表示
                card.innerHTML = `
                    <div class="card news-card ${isRead ? 'read' : ''} shadow-sm mb-3">
                        <div class="card-body">
                            <div class="d-flex justify-content-between align-items-start mb-2">
                                <span class="badge bg-primary">${item.category}</span>
                                <small class="text-muted">${item.date || ''}</small>
                            </div>
                            <h5 class="card-title h6 fw-bold">
                                <a href="${item.url}" target="_blank" class="text-decoration-none text-body" onclick="markAsRead('${item.id}')">${item.title}</a>
                            </h5>
                            <ul class="card-text mt-3 text-secondary ps-3 small">
                                ${item.summary.map(s => `<li>${s}</li>`).join('')}
                            </ul>
                            <div class="d-flex justify-content-end gap-2 mt-2 border-top pt-2">
                                <button class="btn btn-sm ${isRead ? 'btn-secondary' : 'btn-outline-secondary'}" onclick="toggleRead('${item.id}')">
                                    <i class="bi ${isRead ? 'bi-check-circle-fill' : 'bi-circle'}"></i> ${isRead ? '既読' : '未読にする'}
                                </button>
                                <button class="btn btn-sm ${isFav ? 'btn-warning' : 'btn-outline-warning'}" onclick="toggleFav('${item.id}')">
                                    <i class="bi ${isFav ? 'bi-star-fill' : 'bi-star'}"></i> お気に入り
                                </button>
                            </div>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function markAsRead(id) { if (!reads.includes(id)) { reads.push(id); saveState(); renderNews(); } }
        
        function toggleRead(id) {
            const index = reads.indexOf(id);
            if (index > -1) reads.splice(index, 1);
            else reads.push(id);
            saveState(); renderNews();
        }
        
        function toggleFav(id) {
            const index = favorites.indexOf(id);
            if (index > -1) favorites.splice(index, 1);
            else favorites.push(id);
            saveState(); renderNews();
        }
        
        function saveState() {
            localStorage.setItem('news_reads', JSON.stringify(reads));
            localStorage.setItem('news_favorites', JSON.stringify(favorites));
        }

        // タブ切り替えのイベント設定
        document.getElementById('categoryTabs').addEventListener('click', (e) => {
            if (e.target.tagName === 'A' || e.target.closest('a')) {
                const target = e.target.tagName === 'A' ? e.target : e.target.closest('a');
                document.querySelectorAll('#categoryTabs .nav-link').forEach(el => el.classList.remove('active'));
                target.classList.add('active');
                currentCategory = target.getAttribute('data-category');
                renderNews();
            }
        });
    </script>
</body>
</html>
