name: Auto News Summary

on:
  schedule:
    # 日本時間 朝7:00 (22:00 UTC), 昼12:00 (3:00 UTC), 夜21:00 (12:00 UTC) に自動実行
    - cron: '0 22,3,12 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install google-genai requests feedparser Pillow

    - name: Run script
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        GMAIL_USER: ${{ secrets.GMAIL_USER }}
        GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD}}
      run: python main.py

    - name: Commit and Push changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add news_data.json daily_digest.jpg || true
        git diff --cached --quiet || (git commit -m "Update news database and digest image" && git push)
