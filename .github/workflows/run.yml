name: Auto News Summary

on:
  schedule:
    # 毎日日本時間の朝7時（UTC時間の前日22:00）に自動実行
    - cron: '0 22 * * *'
  workflow_dispatch: # ボタンを押して手動で今すぐ実行することもできるようにします

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install google-genai requests feedparser

    - name: Run script
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      run: python main.py

    - name: Commit and Push changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add index.html
        # 変更がある場合のみサイトを更新
        git diff --cached --quiet || (git commit -m "Update news site" && git push)
